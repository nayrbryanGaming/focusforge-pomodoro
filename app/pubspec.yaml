name: focusforge_pomodoro
description: Forge Deep Focus. Build Unstoppable Productivity.
publish_to: 'none'
version: 1.2.0+8

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.5.1

  # UI & Styling
  cupertino_icons: ^1.0.6
  google_fonts: ^6.1.0

  # Backend
  firebase_core: ^2.27.1
  firebase_auth: ^4.19.1
  cloud_firestore: ^4.15.8
  firebase_analytics: ^10.8.9
  firebase_crashlytics: ^3.4.20

  # Utils
  shared_preferences: ^2.2.2
  intl: ^0.18.1
  uuid: ^4.3.3
  url_launcher: ^6.2.6

  # Charts & Analytics visualization
  fl_chart: ^0.66.0

  # Markdown rendering (for legal docs)
  flutter_markdown: ^0.6.18+4

  # Animations
  animate_do: ^3.3.4
  flutter_animate: ^4.5.0

  # Notifications & Alerts
  flutter_local_notifications: ^17.1.0
  permission_handler: ^11.3.1

  # Audio
  audioplayers: ^5.2.1

  # Onboarding & Splash
  flutter_native_splash: ^2.4.0
  flutter_launcher_icons: ^0.13.1

  # Celebration effects
  confetti: ^0.8.0

  # Lottie animations
  lottie: ^3.1.2

  # In-app review prompt
  in_app_review: ^2.0.9

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
    - assets/sounds/
    - assets/lottie/
    - legal/privacy_policy.md
    - legal/terms_of_service.md
    - legal/data_usage_policy.md
    - legal/disclaimer.md
